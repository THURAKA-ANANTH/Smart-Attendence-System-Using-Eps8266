<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Classrooms</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0 10px;
            background-color: #f5f5f5;
            color: #333;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
        }
        h2 {
            margin: 0;
            font-size: 1.5rem;
        }
        a.logout {
            text-decoration: none;
            color: #fff;
            background-color: #ff4d4d;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.9rem;
        }
        ul.classroom-list {
            list-style: none;
            padding: 0;
            margin: 10px 0;
        }
        ul.classroom-list li {
            margin: 10px 0;
        }
        a.classroom-card {
            display: block;
            padding: 15px;
            background-color: #fff;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        a.classroom-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        p.no-classrooms {
            text-align: center;
            margin-top: 30px;
            color: #777;
        }
    </style>
</head>
<body>
    <header>
        <h2>Your Classrooms</h2>
        <a href="{% url 'faculty_logout' %}" class="logout">Logout</a>
    </header>

    {% if classrooms %}
        <ul class="classroom-list">
            {% for classroom in classrooms %}
                <li>
                    <a href="{% url 'classroom_subjects' classroom.id %}" class="classroom-card">
                        {{ classroom.name }}
                    </a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p class="no-classrooms">No classrooms assigned.</p>
    {% endif %}
</body>
</html>
