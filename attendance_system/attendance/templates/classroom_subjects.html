<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Subjects</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0 10px;
            background-color: #f5f5f5;
            color: #333;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
        }
        h2 {
            font-size: 1.5rem;
            margin: 0;
        }
        a.back-btn {
            text-decoration: none;
            color: #fff;
            background-color: #4da6ff;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.9rem;
        }
        ul.subject-list {
            list-style: none;
            padding: 0;
            margin: 15px 0;
        }
        li.subject-card {
            background-color: #fff;
            margin: 10px 0;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        li.subject-card a.mark-attendance {
            text-decoration: none;
            color: #fff;
            background-color: #28a745;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85rem;
        }
        p.no-subjects {
            text-align: center;
            margin-top: 30px;
            color: #777;
        }
    </style>
</head>
<body>
    <header>
        <h2>Subjects for {{ classroom.name }}</h2>
        <a href="{% url 'faculty_classrooms' %}" class="back-btn">Back</a>
    </header>

    {% if timetable_entries %}
        <ul class="subject-list">
            {% for entry in timetable_entries %}
                <li class="subject-card">
                    <span>{{ entry.subject.name }} (Period {{ entry.period_number }})</span>
                    <a href="{% url 'mark_attendance' entry.id %}" class="mark-attendance">Mark Attendance</a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p class="no-subjects">No subjects found for this classroom.</p>
    {% endif %}
</body>
</html>
