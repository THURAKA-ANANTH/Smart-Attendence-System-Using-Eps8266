<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #f5f5f5;
            color: #333;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
        }

        h2 {
            font-size: 1.4rem;
            margin: 0;
        }

        a.back-btn {
            text-decoration: none;
            color: #fff;
            background-color: #4da6ff;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.9rem;
        }

        form {
            margin-top: 20px;
        }

        label {
            font-weight: bold;
        }

        input[type="date"] {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            width: 100%;
            max-width: 250px;
            margin-top: 5px;
        }

        .student-card {
            background-color: #fff;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .student-card label {
            margin-right: 10px;
            flex: 1 1 100%;
        }

        select {
            padding: 6px 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 0.95rem;
        }

        button.submit-btn {
            display: block;
            width: 100%;
            max-width: 300px;
            background-color: #28a745;
            color: #fff;
            border: none;
            padding: 12px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }

        button.submit-btn:hover {
            background-color: #218838;
        }

        @media(min-width: 600px) {
            .student-card label {
                flex: 1 1 auto;
            }
        }
    </style>
</head>
<body>
    <header>
        <h2>Mark Attendance for {{ timetable.subject.name }} - {{ timetable.classroom.name }}</h2>
        <a href="{% url 'classroom_subjects' timetable.classroom.id %}" class="back-btn">Back</a>
    </header>

    <form method="post">
        {% csrf_token %}
        <label for="date">Date:</label>
        <input type="date" id="date" name="date" value="{{ today }}"><br><br>

        {% for student in students %}
        <div class="student-card">
            <label>{{ student.name }}</label>
            <select name="status_{{ student.id }}">
                <option value="present">Present</option>
                <option value="absent">Absent</option>
                <option value="late">Late</option>
            </select>
        </div>
        {% endfor %}

        <button type="submit" class="submit-btn">Save Attendance</button>
    </form>
</body>
</html>
